name: Release

on:
  push:
    tags:
      - 'v*'

jobs:

  release-github:
    name: Release on GitHub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin
          cache: maven
      - name: Build with maven
        run: mvn install -B
      - name: Extract version
        run: echo ::set-output name=value::$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)
        id: version
      - name: Show extracted Maven project version
        run: echo ${{ steps.version.outputs.value }}
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Baremaps ${{ steps.version.outputs.value }}
          draft: true
          prerelease: true
      - name: Upload source release
        id: upload-source-release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./baremaps-cli/target/apache-baremaps-${{ steps.version.outputs.value }}-incubating-src.tar.gz
          asset_name: apache-baremaps-${{ steps.version.outputs.value }}-incubating-src.tar.gz
          asset_content_type: application/x-gzip
      - name: Upload binary release
        id: upload-binary-release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./baremaps-cli/target/apache-baremaps-${{ steps.version.outputs.value }}-incubating-bin.tar.gz
          asset_name: apache-baremaps-${{ steps.version.outputs.value }}-incubating-bin.tar.gz
          asset_content_type: application/x-gzip

